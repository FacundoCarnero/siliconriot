<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Básico -->
  <title>SILICON RIOT // Official Site</title>
  <meta name="description" content="Official site of Silicon Riot. 80s Synth-Pop, Retrowave & Cyberpunk Music. Listen to Neon Fantasy on Spotify, Apple Music, YouTube and more.">
  <meta name="keywords" content="Silicon Riot, Synthwave, Retrowave, Cyberpunk, Synth-Pop, Neon Fantasy, 80s Music">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://silicon-riot.com/">

  <!-- Open Graph (WhatsApp, Instagram, Facebook, LinkedIn) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://silicon-riot.com/">
  <meta property="og:title" content="SILICON RIOT // Official Site">
  <meta property="og:description" content="Official site of Silicon Riot. Listen to Neon Fantasy and connect on streaming platforms.">
  <meta property="og:image" content="https://silicon-riot.com/assets/cover.jpg">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://silicon-riot.com/">
  <meta name="twitter:title" content="SILICON RIOT // Official Site">
  <meta name="twitter:description" content="Official site of Silicon Riot. Listen to Neon Fantasy and connect on streaming platforms.">
  <meta name="twitter:image" content="https://silicon-riot.com/assets/cover.jpg">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@600;700&display=swap');

    :root {
      --neon-pink: #ff007f;
      --neon-cyan: #00f3ff;
      --bg-dark: #05020a;
    }

    /* MODO OVERDRIVE (EASTER EGG KONAMI CODE) */
    body.overdrive {
      --neon-pink: #ff0000;
      --neon-cyan: #ff5500;
      --bg-dark: #100000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: background-color 0.5s ease;
    }

    .sun {
      position: absolute;
      top: 10%;
      width: 180px;
      height: 180px;
      background: linear-gradient(#ffdd00, var(--neon-pink));
      border-radius: 50%;
      box-shadow: 0 0 40px var(--neon-pink);
      z-index: 1;
      transition: all 0.5s ease;
    }

    .equalizer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 90px;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      gap: 2px;
      z-index: 2;
      opacity: 0.85;
      padding: 0 5px;
    }

    .bar {
      flex: 1;
      height: 4px;
      background: linear-gradient(to top, var(--neon-cyan), var(--neon-pink));
      border-radius: 2px 2px 0 0;
      box-shadow: 0 0 5px var(--neon-cyan);
      transition: height 0.05s ease;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem 1.5rem;
      background: rgba(8, 3, 18, 0.88);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 25px var(--neon-cyan), inset 0 0 15px rgba(0,243,255,0.2);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      max-width: 90%;
      width: 520px;
      transition: all 0.5s ease;
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.8rem;
      color: #fff;
      text-shadow: 3px 3px var(--neon-pink), -2px -2px var(--neon-cyan);
      margin-bottom: 1.2rem;
      letter-spacing: 2px;
      animation: glitch 2.5s infinite;
    }

    @keyframes glitch {
      0%, 100% { text-shadow: 3px 3px var(--neon-pink), -2px -2px var(--neon-cyan); }
      25% { text-shadow: -3px 2px var(--neon-pink), 3px -2px var(--neon-cyan); }
      50% { text-shadow: 2px -3px var(--neon-cyan), -3px 2px var(--neon-pink); }
    }

    .status {
      font-size: 1rem;
      color: var(--neon-cyan);
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
      cursor: pointer;
    }

    .blink { animation: blinker 0.8s infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    /* REPRODUCTOR CON SELECTOR DE TRACKS */
    .player-box {
      background: rgba(255, 0, 127, 0.1);
      border: 1px dashed var(--neon-pink);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .track-title {
      font-size: 0.85rem;
      color: #fff;
      margin-bottom: 0.8rem;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .player-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    button.btn-action {
      background: var(--neon-pink);
      color: #fff;
      border: none;
      padding: 10px 15px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.65rem;
      cursor: pointer;
      box-shadow: 0 0 10px var(--neon-pink);
      transition: all 0.2s ease;
      border-radius: 4px;
    }

    button.btn-action:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    .volume-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--neon-cyan);
    }

    .volume-box input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 6px;
      background: #222;
      border: 1px solid var(--neon-cyan);
      border-radius: 3px;
      outline: none;
    }

    .volume-box input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--neon-pink);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px var(--neon-pink);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .links a {
      color: #fff;
      text-decoration: none;
      border: 1px solid var(--neon-cyan);
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 4px;
      transition: 0.3s;
      letter-spacing: 1px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .links a:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    .links a.beacons-btn {
      border-color: var(--neon-pink);
      color: #fff;
      background: rgba(255, 0, 127, 0.2);
      width: 100%;
      justify-content: center;
      margin-top: 5px;
    }

    .links a.beacons-btn:hover {
      background: var(--neon-pink);
      color: #fff;
      box-shadow: 0 0 15px var(--neon-pink);
    }

    /* SCANLINES CRT Y BOTON TOGGLE */
    .scanlines {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
      background-size: 100% 4px;
      z-index: 20;
      pointer-events: none;
      display: block;
    }

    .crt-toggle {
      position: fixed;
      bottom: 15px;
      right: 15px;
      z-index: 30;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: 'Press Start 2P', cursive;
      font-size: 0.5rem;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* NOTIFICACIONES DE TERMINAL */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 40;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(5, 2, 10, 0.95);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 15px;
      border-radius: 4px;
      box-shadow: 0 0 10px var(--neon-cyan);
      animation: slideIn 0.3s ease, fadeOut 0.5s ease 2.5s forwards;
    }

    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
  </style>
</head>
<body>

  <div class="sun"></div>
  <div class="equalizer" id="equalizer"></div>
  <div class="scanlines" id="scanlinesLayer"></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- Botón CRT Toggle -->
  <button class="crt-toggle" onclick="toggleCRT(event)">CRT: ON</button>

  <div class="container">
    <h1>SILICON RIOT</h1>
    <div class="status" onclick="handleStatusClick()">
      <span id="typewriter"></span><span class="blink">_</span>
    </div>

    <!-- Reproductor con Mini Discografía -->
    <div class="player-box">
      <p class="track-title" id="trackTitle">▶ TRACK 1 // NEON FANTASY</p>
      
      <div class="player-controls">
        <button class="btn-action" onclick="prevTrack(event)"><i class="fa-solid fa-backward"></i></button>
        <button class="btn-action" id="playBtn" onclick="toggleAudio(event)">PLAY</button>
        <button class="btn-action" onclick="nextTrack(event)"><i class="fa-solid fa-forward"></i></button>
      </div>
      
      <div class="volume-box">
        <i class="fa-solid fa-volume-low"></i>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.08" onclick="event.stopPropagation()" oninput="changeVolume(this.value)">
        <i class="fa-solid fa-volume-high"></i>
      </div>

      <audio id="audioTrack" crossorigin="anonymous" loop>
        <source id="audioSource" src="assets/NF.mp3" type="audio/mpeg">
      </audio>
    </div>

    <!-- Links con Notificación -->
    <div class="links">
      <a href="https://open.spotify.com/intl-es/album/6wyKTUwsMbpDZLMLvhr3Gm" target="_blank" onclick="notify('CONNECTING TO SPOTIFY...')"><i class="fa-brands fa-spotify"></i> SPOTIFY</a>
      <a href="https://music.apple.com/artist/silicon-riot/1792440306" target="_blank" onclick="notify('REDIRECTING TO APPLE MUSIC...')"><i class="fa-brands fa-apple"></i> APPLE MUSIC</a>
      <a href="https://music.amazon.com/albums/B0GYBYQX85" target="_blank" onclick="notify('OPENING AMAZON MUSIC...')"><i class="fa-brands fa-amazon"></i> AMAZON MUSIC</a>
      <a href="https://www.youtube.com/@siliconriot80s" target="_blank" onclick="notify('LAUNCHING YOUTUBE CHANNEL...')"><i class="fa-brands fa-youtube"></i> YOUTUBE</a>
      <a href="https://www.instagram.com/siliconriot80s" target="_blank" onclick="notify('OPENING INSTAGRAM PROTOCOL...')"><i class="fa-brands fa-instagram"></i> INSTAGRAM</a>
      <a href="https://beacons.ai/siliconriot" target="_blank" class="beacons-btn" onclick="notify('ACCESSING ALL BEACONS LINKS...')"><i class="fa-solid fa-star"></i> ALL LINKS // BEACONS</a>
    </div>
  </div>

  <script>
    // --- 1. NOTIFICACIONES DE TERMINAL ---
    function notify(msg) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerText = `> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // --- 2. MINI DISCOGRAFÍA / PLAYLIST ---
    const playlist = [
      { title: "▶ TRACK 1 // NEON FANTASY", file: "assets/NF.mp3" }
    ];
    let currentTrackIndex = 0;

    const audio = document.getElementById('audioTrack');
    const audioSource = document.getElementById('audioSource');
    const trackTitle = document.getElementById('trackTitle');
    const btn = document.getElementById('playBtn');
    audio.volume = 0.08;

    function loadTrack(index) {
      currentTrackIndex = index;
      audioSource.src = playlist[index].file;
      trackTitle.innerText = playlist[index].title;
      audio.load();
      if (!audio.paused) audio.play();
      notify(`LOADED: ${playlist[index].title}`);
    }

    function prevTrack(e) {
      if (e) e.stopPropagation();
      currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentTrackIndex);
    }

    function nextTrack(e) {
      if (e) e.stopPropagation();
      currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
      loadTrack(currentTrackIndex);
    }

    // --- 3. TOGGLE CRT (SCANLINES) ---
    function toggleCRT(e) {
      if (e) e.stopPropagation();
      const scanlines = document.getElementById('scanlinesLayer');
      const btn = e.target;
      if (scanlines.style.display === 'none') {
        scanlines.style.display = 'block';
        btn.innerText = 'CRT: ON';
        notify('CRT FILTER ENABLED');
      } else {
        scanlines.style.display = 'none';
        btn.innerText = 'CRT: OFF';
        notify('CRT FILTER DISABLED');
      }
    }

    // --- 4. EASTER EGGS (KONAMI CODE + TRIPLE CLICK) ---
    let clickCount = 0;
    function handleStatusClick() {
      clickCount++;
      if (clickCount === 3) {
        notify('SECRET PROMPT: ACCESS GRANTED_');
        alert("SYSTEM CONSOLE v1.0\n-------------------\nBand: Silicon Riot\nStatus: Active\nType 'OVERDRIVE' via Konami Code for secret mode!");
        clickCount = 0;
      }
      setTimeout(() => clickCount = 0, 1000);
    }

    const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
    let konamiIndex = 0;

    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === konamiCode[konamiIndex].toLowerCase()) {
        konamiIndex++;
        if (konamiIndex === konamiCode.length) {
          document.body.classList.toggle('overdrive');
          notify('OVERDRIVE MODE ACTIVATED! ⚡');
          konamiIndex = 0;
        }
      } else {
        konamiIndex = 0;
      }
    });

    // --- EFECTO TYPEWRITER ---
    const textToType = "SYSTEM INITIALIZING... AUDIO ONLINE";
    const typewriterElement = document.getElementById('typewriter');
    let typeIndex = 0;

    function typeWriter() {
      if (typeIndex < textToType.length) {
        typewriterElement.innerHTML += textToType.charAt(typeIndex);
        typeIndex++;
        setTimeout(typeWriter, 80);
      }
    }
    window.onload = typeWriter;

    // --- ECUALIZADOR Y AUDIO ---
    const eq = document.getElementById('equalizer');
    const NUM_BARS = 32;
    const bars = [];

    for (let i = 0; i < NUM_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      eq.appendChild(bar);
      bars.push(bar);
    }

    let audioCtx, analyser, source, dataArray;
    let isAudioContextSetup = false;

    function setupAudioContext() {
      if (isAudioContextSetup) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;

      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);

      dataArray = new Uint8Array(analyser.frequencyBinCount);
      isAudioContextSetup = true;

      renderFrame();
    }

    function renderFrame() {
      requestAnimationFrame(renderFrame);
      if (!analyser) return;

      analyser.getByteFrequencyData(dataArray);

      for (let i = 0; i < NUM_BARS; i++) {
        const value = dataArray[i] || 0;
        const percent = value / 255;
        const height = Math.max(4, percent * 85);
        bars[i].style.height = `${height}px`;
      }
    }

    function changeVolume(val) {
      audio.volume = val;
    }

    function toggleAudio(e) {
      if (e) e.stopPropagation();
      
      setupAudioContext();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      if (audio.paused) {
        audio.play().then(() => {
          btn.innerText = "PAUSE";
          btn.style.background = "var(--neon-cyan)";
          btn.style.color = "#000";
        }).catch(err => console.log("Autoplay bloqueado:", err));
      } else {
        audio.pause();
        btn.innerText = "PLAY";
        btn.style.background = "var(--neon-pink)";
        btn.style.color = "#fff";
      }
    }

    document.body.addEventListener('click', function startOnFirstClick() {
      if (audio.paused) {
        toggleAudio();
      }
      document.body.removeEventListener('click', startOnFirstClick);
    }, { once: true });
  </script>
</body>
</html>
