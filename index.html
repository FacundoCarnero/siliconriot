<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:description" content="Official site of Silicon Riot. Listen to Neon Fantasy and connect on streaming platforms.">

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:title" content="SILICON RIOT // Official Site">
  <meta name="twitter:description" content="Official site of Silicon Riot. Listen to Neon Fantasy and connect on streaming platforms.">
  <meta name="twitter:image" content="https://silicon-riot.com/assets/cover.jpg">

  <!-- Iconos de Redes Sociales (FontAwesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@600;700&display=swap');

    :root {
      --neon-pink: #ff007f;
      --neon-cyan: #00f3ff;
      --bg-dark: #05020a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    /* Sol Retrowave */
    .sun {
      position: absolute;
      top: 10%;
      width: 180px;
      height: 180px;
      background: linear-gradient(#ffdd00, var(--neon-pink));
      border-radius: 50%;
      box-shadow: 0 0 40px var(--neon-pink);
      z-index: 1;
    }

    /* Ecualizador Reactivo */
    .equalizer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 90px;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      gap: 2px;
      z-index: 2;
      opacity: 0.85;
      padding: 0 5px;
    }

    .bar {
      flex: 1;
      height: 4px;
      background: linear-gradient(to top, var(--neon-cyan), var(--neon-pink));
      border-radius: 2px 2px 0 0;
      box-shadow: 0 0 5px var(--neon-cyan);
      transition: height 0.05s ease;
    }

    /* Tarjeta Central Cyberpunk */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem 1.5rem;
      background: rgba(8, 3, 18, 0.88);
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 25px var(--neon-cyan), inset 0 0 15px rgba(0,243,255,0.2);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      max-width: 90%;
      width: 520px;
    }

    /* Texto con Glitch Effect */
    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.8rem;
      color: #fff;
      text-shadow: 3px 3px var(--neon-pink), -2px -2px var(--neon-cyan);
      margin-bottom: 1.2rem;
      letter-spacing: 2px;
      animation: glitch 2.5s infinite;
    }

    @keyframes glitch {
      0%, 100% { text-shadow: 3px 3px var(--neon-pink), -2px -2px var(--neon-cyan); }
      25% { text-shadow: -3px 2px var(--neon-pink), 3px -2px var(--neon-cyan); }
      50% { text-shadow: 2px -3px var(--neon-cyan), -3px 2px var(--neon-pink); }
    }

    .status {
      font-size: 1rem;
      color: var(--neon-cyan);
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }

    .blink { animation: blinker 0.8s infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    /* Reproductor Cyberpunk */
    .player-box {
      background: rgba(255, 0, 127, 0.1);
      border: 1px dashed var(--neon-pink);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .player-box p {
      font-size: 0.9rem;
      color: #ddd;
      margin-bottom: 0.8rem;
      letter-spacing: 1px;
    }

    button {
      background: var(--neon-pink);
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.7rem;
      cursor: pointer;
      box-shadow: 0 0 10px var(--neon-pink);
      transition: all 0.2s ease;
      border-radius: 4px;
    }

    button:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    /* Control de Volumen */
    .volume-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--neon-cyan);
    }

    .volume-box input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 6px;
      background: #222;
      border: 1px solid var(--neon-cyan);
      border-radius: 3px;
      outline: none;
    }

    .volume-box input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--neon-pink);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px var(--neon-pink);
    }

    /* Links a Redes */
    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .links a {
      color: #fff;
      text-decoration: none;
      border: 1px solid var(--neon-cyan);
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 4px;
      transition: 0.3s;
      letter-spacing: 1px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .links a:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    .links a.beacons-btn {
      border-color: var(--neon-pink);
      color: #fff;
      background: rgba(255, 0, 127, 0.2);
      width: 100%;
      justify-content: center;
      margin-top: 5px;
    }

    .links a.beacons-btn:hover {
      background: var(--neon-pink);
      color: #fff;
      box-shadow: 0 0 15px var(--neon-pink);
    }

    /* Scanlines CRT */
    .scanlines {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
      background-size: 100% 4px;
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="sun"></div>

  <!-- Contenedor del ecualizador -->
  <div class="equalizer" id="equalizer"></div>

  <div class="scanlines"></div>

  <div class="container">
    <h1>SILICON RIOT</h1>
    <div class="status">
      <span id="typewriter"></span><span class="blink">_</span>
    </div>

    <!-- Reproductor -->
    <div class="player-box">
      <p>▶ TRANSMISSION // NEON FANTASY</p>
      <button id="playBtn" onclick="toggleAudio(event)">PLAY TRACK</button>
      
      <div class="volume-box">
        <i class="fa-solid fa-volume-low"></i>
        <!-- Slider seteado por defecto en 0.08 (8%) -->
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.08" onclick="event.stopPropagation()" oninput="changeVolume(this.value)">
        <i class="fa-solid fa-volume-high"></i>
      </div>

      <audio id="audioTrack" crossorigin="anonymous" loop>
        <source src="assets/NF.mp3" type="audio/mpeg">
      </audio>
    </div>

    <!-- Redes -->
    <div class="links">
      <a href="https://open.spotify.com/intl-es/album/6wyKTUwsMbpDZLMLvhr3Gm" target="_blank"><i class="fa-brands fa-spotify"></i> SPOTIFY</a>
      <a href="https://music.apple.com/artist/silicon-riot/1792440306" target="_blank"><i class="fa-brands fa-apple"></i> APPLE MUSIC</a>
      <a href="https://music.amazon.com/albums/B0GYBYQX85" target="_blank"><i class="fa-brands fa-amazon"></i> AMAZON MUSIC</a>
      <a href="https://www.youtube.com/@siliconriot80s" target="_blank"><i class="fa-brands fa-youtube"></i> YOUTUBE</a>
      <a href="https://www.instagram.com/siliconriot80s" target="_blank"><i class="fa-brands fa-instagram"></i> INSTAGRAM</a>
      <a href="https://beacons.ai/siliconriot" target="_blank" class="beacons-btn"><i class="fa-solid fa-star"></i> ALL LINKS // BEACONS</a>
    </div>
  </div>

  <script>
    // --- EFECTO MAQUINA DE ESCRIBIR (TYPEWRITER) ---
    const textToType = "SYSTEM INITIALIZING... AUDIO ONLINE";
    const typewriterElement = document.getElementById('typewriter');
    let typeIndex = 0;

    function typeWriter() {
      if (typeIndex < textToType.length) {
        typewriterElement.innerHTML += textToType.charAt(typeIndex);
        typeIndex++;
        setTimeout(typeWriter, 80);
      }
    }
    window.onload = typeWriter;

    // --- GENERAR BARRAS DE ECUALIZADOR ---
    const eq = document.getElementById('equalizer');
    const NUM_BARS = 32;
    const bars = [];

    for (let i = 0; i < NUM_BARS; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      eq.appendChild(bar);
      bars.push(bar);
    }

    // --- AUDIO Y ECUALIZADOR REACTIVO EN VIVO ---
    const audio = document.getElementById('audioTrack');
    const btn = document.getElementById('playBtn');
    
    // VOLUMEN INICIAL AL 8%
    audio.volume = 0.08;

    let audioCtx, analyser, source, dataArray;
    let isAudioContextSetup = false;

    function setupAudioContext() {
      if (isAudioContextSetup) return;
      
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;

      source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);

      dataArray = new Uint8Array(analyser.frequencyBinCount);
      isAudioContextSetup = true;

      renderFrame();
    }

    function renderFrame() {
      requestAnimationFrame(renderFrame);
      if (!analyser) return;

      analyser.getByteFrequencyData(dataArray);

      for (let i = 0; i < NUM_BARS; i++) {
        const value = dataArray[i] || 0;
        const percent = value / 255;
        const height = Math.max(4, percent * 85);
        bars[i].style.height = `${height}px`;
      }
    }

    function changeVolume(val) {
      audio.volume = val;
    }

    function toggleAudio(e) {
      if (e) e.stopPropagation();
      
      setupAudioContext();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      if (audio.paused) {
        audio.play().then(() => {
          btn.innerText = "PAUSE TRANSMISSION";
          btn.style.background = "var(--neon-cyan)";
          btn.style.color = "#000";
        }).catch(err => console.log("Autoplay bloqueado:", err));
      } else {
        audio.pause();
        btn.innerText = "PLAY TRACK";
        btn.style.background = "var(--neon-pink)";
        btn.style.color = "#fff";
      }
    }

    // Auto-arranque al primer clic global
    document.body.addEventListener('click', function startOnFirstClick() {
      if (audio.paused) {
        toggleAudio();
      }
      document.body.removeEventListener('click', startOnFirstClick);
    }, { once: true });
  </script>
</body>
</html>
